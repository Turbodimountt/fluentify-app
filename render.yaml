services:
  # Backend: FastAPI
  - type: web
    name: fluentify-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: DEBUG
        value: "false"

  # Frontend: React (Static Site)
  - type: web
    name: fluentify-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: fluentify-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
